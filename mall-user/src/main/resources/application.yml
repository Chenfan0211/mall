server:
  port: 18092

spring:
  application:
    name: mall-user
  config:
    import:
      - optional:nacos:mall-common.yaml?group=${NACOS_GROUP:MALL_GROUP}
      - optional:nacos:mall-user.yaml?group=${NACOS_GROUP:MALL_GROUP}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:MALL_GROUP}
        file-extension: yaml
      discovery:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:MALL_GROUP}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/mall?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
