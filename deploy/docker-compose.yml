name: ${COMPOSE_PROJECT_NAME:-mall}

x-backend-common: &backend-common
  restart: unless-stopped
  env_file:
    - .env
  environment:
    TZ: ${TZ:-Asia/Shanghai}
    SPRING_PROFILES_ACTIVE: prod
    NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-mall-nacos:8848}
    NACOS_NAMESPACE: ${NACOS_NAMESPACE:-mall-test}
    NACOS_GROUP: ${NACOS_GROUP:-MALL_GROUP}
    NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
    NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
    MALL_TOKEN_SECRET: ${MALL_TOKEN_SECRET:?MALL_TOKEN_SECRET is required}
    SPRING_DATASOURCE_URL: jdbc:mysql://mall-mysql:3306/${MYSQL_APP_DATABASE:-mall}?useUnicode=true&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER:-mall}
    SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD:?MYSQL_APP_PASSWORD is required}
    JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseContainerSupport}
    XXL_JOB_ADMIN_ADDRESSES: ${XXL_JOB_ADMIN_ADDRESSES:-http://mall-xxl-job:8080/xxl-job-admin}
    XXL_JOB_EXECUTOR_APPNAME: ${XXL_JOB_EXECUTOR_APPNAME:-mall-job}
    XXL_JOB_EXECUTOR_PORT: ${XXL_JOB_EXECUTOR_PORT:-9999}
  depends_on:
    mall-mysql:
      condition: service_healthy
    mall-nacos:
      condition: service_healthy
  networks:
    - mall-internal

services:
  mall-mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: mall-mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_APP_DATABASE: ${MYSQL_APP_DATABASE:-mall}
      MYSQL_APP_USER: ${MYSQL_APP_USER:-mall}
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD:?MYSQL_APP_PASSWORD is required}
      NACOS_DATABASE: ${NACOS_DATABASE:-nacos_config}
      XXL_JOB_DATABASE: ${XXL_JOB_DATABASE:-xxl_job}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --log-bin=mysql-bin
      - --slow-query-log=ON
      - --long-query-time=1
    volumes:
      - ${MALL_DEPLOY_ROOT:-/opt/mall-deploy}/data/mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ../Sql:/app-sql:ro
    ports:
      - "0.0.0.0:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - mall-internal

  mall-redis:
    image: ${REDIS_IMAGE:-redis:7.4}
    container_name: mall-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "900"
      - "1"
      - --save
      - "300"
      - "10"
      - --save
      - "60"
      - "10000"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - ${MALL_DEPLOY_ROOT:-/opt/mall-deploy}/data/redis:/data
    ports:
      - "0.0.0.0:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - mall-internal

  mall-nacos:
    image: ${NACOS_IMAGE:-nacos/nacos-server:v2.4.3}
    container_name: mall-nacos
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mall-mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: ${NACOS_DATABASE:-nacos_config}
      MYSQL_SERVICE_USER: ${MYSQL_APP_USER:-mall}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_APP_PASSWORD:?MYSQL_APP_PASSWORD is required}
      MYSQL_SERVICE_DB_PARAM: connectionCollation=utf8mb4_unicode_ci&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    volumes:
      - ${MALL_DEPLOY_ROOT:-/opt/mall-deploy}/data/nacos/logs:/home/nacos/logs
      - ${MALL_DEPLOY_ROOT:-/opt/mall-deploy}/data/nacos/data:/home/nacos/data
    ports:
      - "0.0.0.0:8848:8848"
      - "0.0.0.0:9848:9848"
      - "0.0.0.0:9849:9849"
    depends_on:
      mall-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
    networks:
      - mall-internal

  mall-rocketmq-namesrv:
    image: ${ROCKETMQ_IMAGE:-apache/rocketmq:5.3.2}
    container_name: mall-rocketmq-namesrv
    restart: unless-stopped
    command: sh mqnamesrv
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_OPT_EXT: -Xms256m -Xmx256m -Xmn128m
    volumes:
      - ${MALL_DEPLOY_ROOT:-/opt/mall-deploy}/data/rocketmq/namesrv/logs:/home/rocketmq/logs
    ports:
      - "0.0.0.0:9876:9876"
    networks:
      - mall-internal

  mall-rocketmq-broker:
    image: ${ROCKETMQ_IMAGE:-apache/rocketmq:5.3.2}
    container_name: mall-rocketmq-broker
    restart: unless-stopped
    command: sh mqbroker -c /home/rocketmq/conf/broker.conf
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NAMESRV_ADDR: mall-rocketmq-namesrv:9876
      JAVA_OPT_EXT: -Xms512m -Xmx512m -Xmn256m
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/conf/broker.conf:ro
      - ${MALL_DEPLOY_ROOT:-/opt/mall-deploy}/data/rocketmq/broker/logs:/home/rocketmq/logs
      - ${MALL_DEPLOY_ROOT:-/opt/mall-deploy}/data/rocketmq/broker/store:/home/rocketmq/store
    ports:
      - "0.0.0.0:10909:10909"
      - "0.0.0.0:10911:10911"
      - "0.0.0.0:10912:10912"
    depends_on:
      - mall-rocketmq-namesrv
    networks:
      - mall-internal

  mall-elasticsearch:
    image: ${ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.19.4}
    container_name: mall-elasticsearch
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      bootstrap.memory_lock: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - ${MALL_DEPLOY_ROOT:-/opt/mall-deploy}/data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "0.0.0.0:9200:9200"
      - "0.0.0.0:9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
    networks:
      - mall-internal

  mall-minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z}
    container_name: mall-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - ${MALL_DEPLOY_ROOT:-/opt/mall-deploy}/data/minio:/data
    ports:
      - "0.0.0.0:9000:9000"
      - "0.0.0.0:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - mall-internal

  mall-xxl-job:
    image: ${XXL_JOB_IMAGE:-xuxueli/xxl-job-admin:2.4.1}
    container_name: mall-xxl-job
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PARAMS: >
        --spring.datasource.url=jdbc:mysql://mall-mysql:3306/${XXL_JOB_DATABASE:-xxl_job}?useUnicode=true&connectionCollation=utf8mb4_unicode_ci&autoReconnect=true&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        --spring.datasource.username=${MYSQL_APP_USER:-mall}
        --spring.datasource.password=${MYSQL_APP_PASSWORD:?MYSQL_APP_PASSWORD is required}
    depends_on:
      mall-mysql:
        condition: service_healthy
    ports:
      - "0.0.0.0:8080:8080"
    networks:
      - mall-internal

  mall-auth:
    <<: *backend-common
    container_name: mall-auth
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-auth

  mall-system:
    <<: *backend-common
    container_name: mall-system
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-system

  mall-operation:
    <<: *backend-common
    container_name: mall-operation
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-operation

  mall-product:
    <<: *backend-common
    container_name: mall-product
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-product

  mall-sale:
    <<: *backend-common
    container_name: mall-sale
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-sale

  mall-trade:
    <<: *backend-common
    container_name: mall-trade
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-trade

  mall-payment:
    <<: *backend-common
    container_name: mall-payment
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-payment

  mall-aftersale:
    <<: *backend-common
    container_name: mall-aftersale
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-aftersale

  mall-supplier:
    <<: *backend-common
    container_name: mall-supplier
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-supplier

  mall-finance:
    <<: *backend-common
    container_name: mall-finance
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-finance

  mall-wms:
    <<: *backend-common
    container_name: mall-wms
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-wms

  mall-station:
    <<: *backend-common
    container_name: mall-station
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-station

  mall-user:
    <<: *backend-common
    container_name: mall-user
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-user

  mall-job:
    <<: *backend-common
    container_name: mall-job
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-job
    depends_on:
      mall-mysql:
        condition: service_healthy
      mall-xxl-job:
        condition: service_started

  mall-gateway:
    restart: unless-stopped
    container_name: mall-gateway
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        MODULE: mall-gateway
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-mall-nacos:8848}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-mall-test}
      NACOS_GROUP: ${NACOS_GROUP:-MALL_GROUP}
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
      MALL_TOKEN_SECRET: ${MALL_TOKEN_SECRET:?MALL_TOKEN_SECRET is required}
      JAVA_OPTS: ${GATEWAY_JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseContainerSupport}
      MALL_ROUTE_AUTH_URI: http://mall-auth:18080
      MALL_ROUTE_SYSTEM_URI: http://mall-system:18081
      MALL_ROUTE_OPERATION_URI: http://mall-operation:18082
      MALL_ROUTE_PRODUCT_URI: http://mall-product:18083
      MALL_ROUTE_SALE_URI: http://mall-sale:18084
      MALL_ROUTE_TRADE_URI: http://mall-trade:18085
      MALL_ROUTE_PAYMENT_URI: http://mall-payment:18086
      MALL_ROUTE_AFTERSALE_URI: http://mall-aftersale:18087
      MALL_ROUTE_SUPPLIER_URI: http://mall-supplier:18088
      MALL_ROUTE_FINANCE_URI: http://mall-finance:18089
      MALL_ROUTE_WMS_URI: http://mall-wms:18090
      MALL_ROUTE_STATION_URI: http://mall-station:18091
      MALL_ROUTE_USER_URI: http://mall-user:18092
    depends_on:
      - mall-auth
      - mall-system
      - mall-operation
      - mall-product
      - mall-sale
      - mall-trade
      - mall-payment
      - mall-aftersale
      - mall-supplier
      - mall-finance
      - mall-wms
      - mall-station
      - mall-user
    networks:
      - mall-internal

  mall-nginx:
    container_name: mall-nginx
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/docker/nginx.Dockerfile
    environment:
      MALL_BASIC_AUTH_USER: ${MALL_BASIC_AUTH_USER:-mallops}
      MALL_BASIC_AUTH_PASSWORD: ${MALL_BASIC_AUTH_PASSWORD:?MALL_BASIC_AUTH_PASSWORD is required}
    ports:
      - "80:80"
    depends_on:
      - mall-gateway
    networks:
      - mall-internal

networks:
  mall-internal:
    driver: bridge
