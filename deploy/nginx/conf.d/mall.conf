server {
    listen 80;
    server_name _;

    client_max_body_size 50m;
    charset utf-8;

    location = / {
        return 302 /admin/;
    }

    location = /admin {
        return 301 /admin/;
    }

    location = /wms {
        return 301 /wms/;
    }

    location = /user {
        return 301 /user/;
    }

    location = /workbench {
        return 301 /workbench/;
    }

    location = /warehouse {
        return 301 /warehouse/;
    }

    location /api/ {
        proxy_pass http://mall-gateway:18000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /nacos {
        return 301 /nacos/;
    }

    location ^~ /nacos/ {
        auth_basic "Mall Middleware";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://mall-nacos:8848;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /xxl-job-admin {
        return 301 /xxl-job-admin/;
    }

    location ^~ /xxl-job-admin/ {
        auth_basic "Mall Middleware";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://mall-xxl-job:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /es {
        return 301 /es/;
    }

    location ^~ /es/ {
        auth_basic "Mall Middleware";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://mall-elasticsearch:9200/;
        proxy_http_version 1.1;
        proxy_set_header Host mall-elasticsearch;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location ^~ /wms/ {
        alias /usr/share/nginx/html/wms/;
        try_files $uri $uri/ /wms/index.html;
    }

    location ^~ /user/ {
        alias /usr/share/nginx/html/user/;
        try_files $uri $uri/ /user/index.html;
    }

    location ^~ /workbench/ {
        alias /usr/share/nginx/html/workbench/;
        try_files $uri $uri/ /workbench/index.html;
    }

    location = /warehouse/index.html {
        alias /usr/share/nginx/html/warehouse/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ^~ /warehouse/assets/ {
        alias /usr/share/nginx/html/warehouse/assets/;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ^~ /warehouse/ {
        alias /usr/share/nginx/html/warehouse/;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /warehouse/index.html;
    }
}
